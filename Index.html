<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Hosting Site</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>File Hosting Application</h1>
    </header>
    <main>
        <section id="upload-section">
            <h2>Upload File</h2>
            <form id="upload-form">
                <input type="file" id="file-input" name="file" required>
                <button type="submit">Upload</button>
            </form>
            <div id="upload-status"></div>
        </section>
        <section id="file-listing">
            <h2>File Listing</h2>
            <ul id="files"></ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 File Hosting Application</p>
    </footer>
    <script>
        // Upload file functionality
        const uploadForm = document.getElementById('upload-form');
        uploadForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            if (file) {
                const formData = new FormData();
                formData.append('file', file);
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                document.getElementById('upload-status').innerText = result.message;
                if (result.success) {
                    loadFiles();
                }
            }
        });

        // Load files from server
        async function loadFiles() {
            const response = await fetch('/files');
            const files = await response.json();
            const filesList = document.getElementById('files');
            filesList.innerHTML = '';
            files.forEach(file => {
                const li = document.createElement('li');
                li.innerText = file.name;
                const downloadButton = document.createElement('button');
                downloadButton.innerText = 'Download';
                downloadButton.onclick = () => downloadFile(file.id);
                li.appendChild(downloadButton);
                const deleteButton = document.createElement('button');
                deleteButton.innerText = 'Delete';
                deleteButton.onclick = () => deleteFile(file.id);
                li.appendChild(deleteButton);
                filesList.appendChild(li);
            });
        }

        // Download file
        async function downloadFile(fileId) {
            const response = await fetch(`/download/${fileId}`);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = ''; // Use file name if available
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

        // Delete file
        async function deleteFile(fileId) {
            const response = await fetch(`/delete/${fileId}`, {
                method: 'DELETE'
            });
            const result = await response.json();
            alert(result.message);
            loadFiles();
        }

        // Initial file load
        loadFiles();
    </script>
</body>
                                                 </html>
